<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 880" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#7a8a7e"/>
    </marker>
    <marker id="aB" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#5b9bd5"/>
    </marker>
    <marker id="aG" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#6aa37a"/>
    </marker>
    <marker id="aO" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#d4a04a"/>
    </marker>
    <marker id="aR" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#c06f62"/>
    </marker>
    <marker id="aP" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#7a88c4"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1340" height="880" rx="16" fill="#151d16"/>
  <text x="670" y="40" text-anchor="middle" fill="#e8efe6" font-size="22" font-weight="700" letter-spacing="0.5">Field Monitor — Component Diagram (Dark)</text>

  <!-- ==================== ANALOG SENSORS (far left) ==================== -->
  <rect x="18" y="140" width="170" height="392" rx="12" fill="none" stroke="#4a5a4e" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="103" y="162" text-anchor="middle" fill="#7a8a7e" font-size="11" font-weight="600">ANALOG SENSORS</text>

  <!-- Soil Moisture -->
  <rect x="28" y="175" width="150" height="52" rx="9" fill="#1e2a1e" stroke="#b89464" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="44" y="198" fill="#b89464" font-size="18">🌱</text>
  <text x="66" y="198" fill="#e0d8c8" font-size="13" font-weight="600">Soil Moisture</text>
  <text x="66" y="215" fill="#9eb6a4" font-size="10">Capacitive · V20 V26</text>

  <!-- Water Level -->
  <rect x="28" y="237" width="150" height="52" rx="9" fill="#1e2a1e" stroke="#5b9bd5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="44" y="260" fill="#5b9bd5" font-size="18">💧</text>
  <text x="66" y="260" fill="#e0d8c8" font-size="13" font-weight="600">Water Level</text>
  <text x="66" y="277" fill="#9eb6a4" font-size="10">Resistive probe · V23</text>

  <!-- Ambient Light -->
  <rect x="28" y="299" width="150" height="52" rx="9" fill="#1e2a1e" stroke="#d9c47a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="44" y="322" fill="#d9c47a" font-size="18">☀</text>
  <text x="66" y="322" fill="#e0d8c8" font-size="13" font-weight="600">Ambient Light</text>
  <text x="66" y="339" fill="#9eb6a4" font-size="10">Photocell · V22</text>

  <!-- Flame Detector -->
  <rect x="28" y="361" width="150" height="52" rx="9" fill="#1e2a1e" stroke="#d47a7a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="44" y="384" fill="#d47a7a" font-size="18">🔥</text>
  <text x="66" y="384" fill="#e0d8c8" font-size="13" font-weight="600">Flame Detector</text>
  <text x="66" y="401" fill="#9eb6a4" font-size="10">IR sensor · ADS1 A2</text>

  <!-- Gas / Smoke -->
  <rect x="28" y="450" width="150" height="52" rx="9" fill="#1e2a1e" stroke="#c9a0dc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="44" y="473" fill="#c9a0dc" font-size="18">💨</text>
  <text x="66" y="473" fill="#e0d8c8" font-size="13" font-weight="600">Gas / Smoke</text>
  <text x="66" y="490" fill="#9eb6a4" font-size="10">MQ-2 · 5V heater · V23</text>

  <!-- ==================== ADS1115 ADC HUBS ==================== -->
  <!-- ADS1115 #1 -->
  <rect x="228" y="252" width="140" height="60" rx="10" fill="#1a2530" stroke="#5b9bd5" stroke-width="2" filter="url(#shadow)"/>
  <text x="298" y="276" text-anchor="middle" fill="#7ab8d4" font-size="13" font-weight="700">ADS1115 #1</text>
  <text x="298" y="296" text-anchor="middle" fill="#5b9bd5" font-size="10">16-bit ADC · I²C 0x48 (ADDR→GND)</text>

  <!-- ADS1115 #2 -->
  <rect x="228" y="448" width="140" height="54" rx="10" fill="#1a2530" stroke="#5b9bd5" stroke-width="2" filter="url(#shadow)"/>
  <text x="298" y="472" text-anchor="middle" fill="#7ab8d4" font-size="13" font-weight="700">ADS1115 #2</text>
  <text x="298" y="489" text-anchor="middle" fill="#5b9bd5" font-size="10">16-bit ADC · I²C 0x49 (ADDR→VCC)</text>

  <!-- Lines: sensors → ADS1115 #1 -->
  <line x1="178" y1="201" x2="228" y2="268" stroke="#b89464" stroke-width="1.3"/>
  <text x="196" y="225" fill="#9eb6a4" font-size="9" font-weight="600">A0</text>

  <line x1="178" y1="263" x2="228" y2="275" stroke="#5b9bd5" stroke-width="1.3"/>
  <text x="196" y="260" fill="#9eb6a4" font-size="9" font-weight="600">A1</text>

  <line x1="178" y1="325" x2="228" y2="288" stroke="#d9c47a" stroke-width="1.3"/>
  <text x="196" y="314" fill="#9eb6a4" font-size="9" font-weight="600">A3</text>

  <line x1="178" y1="387" x2="228" y2="298" stroke="#d47a7a" stroke-width="1.3"/>
  <text x="196" y="352" fill="#9eb6a4" font-size="9" font-weight="600">A2</text>

  <!-- Line: Gas → ADS1115 #2 -->
  <line x1="178" y1="476" x2="228" y2="475" stroke="#c9a0dc" stroke-width="1.3"/>
  <text x="196" y="467" fill="#9eb6a4" font-size="9" font-weight="600">A0</text>

  <!-- ==================== DIRECT I²C SENSORS ==================== -->
  <!-- Si7021 -->
  <rect x="228" y="560" width="140" height="52" rx="10" fill="#1a2530" stroke="#5b9bd5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="244" y="584" fill="#7ab8d4" font-size="18">🌡</text>
  <text x="268" y="583" fill="#d8eef5" font-size="13" font-weight="600">Si7021</text>
  <text x="244" y="601" fill="#9eb6a4" font-size="10">Temp + Humidity · 0x40</text>
  <text x="355" y="583" text-anchor="end" fill="#5b9bd5" font-size="9" font-weight="600">V5 V6 V7</text>

  <!-- SAM-M8Q GPS -->
  <rect x="228" y="622" width="140" height="52" rx="10" fill="#1a2530" stroke="#5b9bd5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="244" y="646" fill="#6aa37a" font-size="18">📡</text>
  <text x="268" y="645" fill="#d8eef5" font-size="13" font-weight="600">SAM-M8Q</text>
  <text x="244" y="663" fill="#9eb6a4" font-size="10">GPS · Lat/Lon/Alt · 0x42</text>
  <text x="355" y="645" text-anchor="end" fill="#5b9bd5" font-size="9" font-weight="600">V30–34</text>


  <!-- ==================== I²C BUS LINE ==================== -->
  <!-- vertical bus -->
  <line x1="420" y1="282" x2="420" y2="650" stroke="#5b9bd5" stroke-width="3" stroke-linecap="round"/>
  <rect x="408" y="485" width="24" height="22" rx="4" fill="#1a2530"/>
  <text x="420" y="500" text-anchor="middle" fill="#5b9bd5" font-size="10" font-weight="700">I²C</text>

  <!-- horizontal bus to ESP -->
  <line x1="420" y1="390" x2="490" y2="390" stroke="#5b9bd5" stroke-width="3" marker-end="url(#aB)" stroke-linecap="round"/>
  <text x="455" y="383" text-anchor="middle" fill="#5b9bd5" font-size="9">SDA/SCL</text>

  <!-- ADS1115 #1 → bus -->
  <line x1="368" y1="282" x2="420" y2="282" stroke="#5b9bd5" stroke-width="1.5"/>
  <!-- ADS1115 #2 → bus -->
  <line x1="368" y1="475" x2="420" y2="475" stroke="#5b9bd5" stroke-width="1.5"/>
  <!-- Si7021 → bus -->
  <line x1="368" y1="586" x2="420" y2="586" stroke="#5b9bd5" stroke-width="1.5"/>
  <!-- GPS → bus -->
  <line x1="368" y1="648" x2="420" y2="648" stroke="#5b9bd5" stroke-width="1.5"/>

  <!-- dots on bus for each connection -->
  <circle cx="420" cy="282" r="4" fill="#5b9bd5"/>
  <circle cx="420" cy="475" r="4" fill="#5b9bd5"/>
  <circle cx="420" cy="586" r="4" fill="#5b9bd5"/>
  <circle cx="420" cy="648" r="4" fill="#5b9bd5"/>
  <circle cx="420" cy="709" r="3.5" fill="#c06f62" opacity="0.5"/>

  <!-- ==================== CENTRAL MCU ==================== -->
  <rect x="490" y="310" width="260" height="150" rx="14" fill="#2a3d2e" stroke="#6aa37a" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="620" y="348" text-anchor="middle" fill="#84c58f" font-size="20" font-weight="700">ESP8266</text>
  <text x="620" y="370" text-anchor="middle" fill="#c8dcc8" font-size="13">SparkFun Blynk Board</text>
  <line x1="516" y1="385" x2="724" y2="385" stroke="#3d5a40" stroke-width="1"/>
  <text x="620" y="404" text-anchor="middle" fill="#9eb6a4" font-size="11">NodeMCU 1.0 · 3.3 V logic · WiFi</text>
  <text x="620" y="422" text-anchor="middle" fill="#9eb6a4" font-size="11">I²C · ADC A0 · GPIO 0/4/12/15</text>
  <text x="620" y="444" text-anchor="middle" fill="#6aa37a" font-size="11" font-weight="600">Blynk + Local Dashboard dual output</text>

  <!-- ==================== GPIO SENSORS (right) ==================== -->
  <rect x="836" y="178" width="200" height="322" rx="12" fill="none" stroke="#4a6a4e" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="936" y="200" text-anchor="middle" fill="#6aa37a" font-size="11" font-weight="600">GPIO / ONBOARD ADC</text>

  <!-- Sound -->
  <rect x="848" y="213" width="176" height="50" rx="9" fill="#1e2e1e" stroke="#8eb4a2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="864" y="237" fill="#8eb4a2" font-size="18">🔊</text>
  <text x="888" y="236" fill="#e0d8c8" font-size="13" font-weight="600">Ambient Sound</text>
  <text x="888" y="253" fill="#9eb6a4" font-size="10">Board ADC · A0 → V0 V8</text>

  <!-- PIR Motion -->
  <rect x="848" y="273" width="176" height="50" rx="9" fill="#1e2e1e" stroke="#d47a7a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="864" y="293" fill="#d47a7a" font-size="18">👁</text>
  <text x="888" y="292" fill="#e0d8c8" font-size="13" font-weight="600">Motion (PIR)</text>
  <text x="888" y="310" fill="#9eb6a4" font-size="10">HC-SR501 · GPIO12 → V36</text>

  <!-- RGB LED -->
  <rect x="848" y="333" width="176" height="44" rx="9" fill="#1e2e1e" stroke="#c9a0dc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="864" y="358" fill="#c9a0dc" font-size="17">💡</text>
  <text x="888" y="357" fill="#e0d8c8" font-size="13" font-weight="600">RGB LED</text>
  <text x="1011" y="357" text-anchor="end" fill="#6aa37a" font-size="9">GPIO4 · V2 V3 V4 V15</text>

  <!-- ===== AVAILABLE / NOT CONNECTED ===== -->
  <rect x="836" y="388" width="200" height="236" rx="12" fill="none" stroke="#5a5a4a" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="936" y="408" text-anchor="middle" fill="#7a7a6a" font-size="10" font-weight="600">AVAILABLE · NOT CONNECTED</text>

  <!-- Servo Motor -->
  <rect x="848" y="418" width="176" height="36" rx="8" fill="#1a1a18" stroke="#5a5a4a" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="862" y="440" fill="#d9c47a" font-size="14">⚙</text>
  <text x="882" y="440" fill="#8a9a8a" font-size="11">Servo Motor</text>
  <text x="1014" y="440" text-anchor="end" fill="#6a6a5a" font-size="9">PWM · GPIO15</text>

  <!-- DS18B20 waterproof temp -->
  <rect x="848" y="460" width="176" height="36" rx="8" fill="#1a1a18" stroke="#5a5a4a" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="862" y="482" fill="#7ab8d4" font-size="14">🌊</text>
  <text x="882" y="482" fill="#8a9a8a" font-size="11">DS18B20</text>
  <text x="1014" y="482" text-anchor="end" fill="#6a6a5a" font-size="9">OneWire · waterproof</text>

  <!-- Passive Buzzer -->
  <rect x="848" y="502" width="176" height="36" rx="8" fill="#1a1a18" stroke="#5a5a4a" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="862" y="524" fill="#d9c47a" font-size="14">🔔</text>
  <text x="882" y="524" fill="#8a9a8a" font-size="11">Passive Buzzer</text>
  <text x="1014" y="524" text-anchor="end" fill="#6a6a5a" font-size="9">PWM · alerts</text>

  <!-- Voltage Sensor -->
  <rect x="848" y="544" width="176" height="36" rx="8" fill="#1a1a18" stroke="#5a5a4a" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="862" y="566" fill="#c06f62" font-size="14">🔋</text>
  <text x="882" y="566" fill="#8a9a8a" font-size="11">Voltage Sensor</text>
  <text x="1014" y="566" text-anchor="end" fill="#6a6a5a" font-size="9">Analog · battery</text>

  <!-- Relay Module -->
  <rect x="848" y="586" width="176" height="36" rx="8" fill="#1a1a18" stroke="#5a5a4a" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="862" y="608" fill="#6aa37a" font-size="14">⚡</text>
  <text x="882" y="608" fill="#8a9a8a" font-size="11">Relay Module</text>
  <text x="1014" y="608" text-anchor="end" fill="#6a6a5a" font-size="9">Digital · pump/fan</text>

  <!-- GPIO connection lines to ESP -->
  <line x1="750" y1="340" x2="848" y2="238" stroke="#8eb4a2" stroke-width="1.4" marker-end="url(#aG)"/>
  <line x1="750" y1="360" x2="848" y2="298" stroke="#d47a7a" stroke-width="1.4" marker-end="url(#aG)"/>
  <line x1="750" y1="380" x2="848" y2="355" stroke="#c9a0dc" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- pin labels on ESP side -->
  <text x="762" y="334" fill="#6aa37a" font-size="9" font-weight="600">A0</text>
  <text x="762" y="356" fill="#6aa37a" font-size="9" font-weight="600">D6</text>
  <text x="762" y="378" fill="#6aa37a" font-size="9" font-weight="600">D2</text>

  <!-- ==================== BLYNK CLOUD (top) ==================== -->
  <ellipse cx="620" cy="148" rx="130" ry="58" fill="#222235" stroke="#7a88c4" stroke-width="2" filter="url(#shadow)"/>
  <text x="620" y="138" text-anchor="middle" fill="#d0d8f0" font-size="15" font-weight="700">Blynk Cloud</text>
  <text x="620" y="158" text-anchor="middle" fill="#8898c4" font-size="11">WiFi + TLS · V50 toggle</text>
  <text x="620" y="175" text-anchor="middle" fill="#8898c4" font-size="10">virtualWrite() → all V-pins</text>

  <line x1="620" y1="210" x2="620" y2="310" stroke="#7a88c4" stroke-width="2" marker-start="url(#aP)" marker-end="url(#aP)"/>
  <rect x="596" y="248" width="48" height="18" rx="4" fill="#222235"/>
  <text x="620" y="261" text-anchor="middle" fill="#7a88c4" font-size="10" font-weight="600">WiFi</text>

  <!-- ==================== WEB DASHBOARD (bottom-center) ==================== -->
  <rect x="490" y="550" width="260" height="100" rx="14" fill="#1e2a2e" stroke="#d4a04a" stroke-width="2" filter="url(#shadow)"/>
  <text x="620" y="580" text-anchor="middle" fill="#d4a04a" font-size="16" font-weight="700">🖥  Field Monitor Web</text>
  <text x="620" y="600" text-anchor="middle" fill="#b8c4a0" font-size="11">Node.js + Express · SSE real-time</text>
  <text x="620" y="618" text-anchor="middle" fill="#9eb6a4" font-size="11">http://192.168.0.56:3000</text>
  <text x="620" y="638" text-anchor="middle" fill="#7a8a7e" font-size="10">POST /api/data every 5 s</text>

  <line x1="620" y1="460" x2="620" y2="550" stroke="#d4a04a" stroke-width="2" marker-end="url(#aO)"/>
  <rect x="592" y="493" width="56" height="18" rx="4" fill="#1e2a20"/>
  <text x="620" y="506" text-anchor="middle" fill="#d4a04a" font-size="10" font-weight="600">HTTP</text>

  <!-- ==================== POWER ==================== -->
  <!-- 3.3V to ESP8266 -->
  <rect x="280" y="760" width="170" height="55" rx="10" fill="#2a2020" stroke="#c06f62" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="296" y="784" fill="#c06f62" font-size="16">🔋</text>
  <text x="318" y="783" fill="#e0c0b8" font-size="13" font-weight="600">3.3 V Rail</text>
  <text x="296" y="802" fill="#9eb6a4" font-size="10">MCU logic + all sensors</text>

  <line x1="450" y1="785" x2="480" y2="785" stroke="#c06f62" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="480" y1="785" x2="480" y2="460" stroke="#c06f62" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#aR)"/>
  <text x="468" y="778" fill="#c06f62" font-size="9" font-weight="600">3.3 V</text>

  <!-- 5V to MQ-2 gas sensor heater -->
  <rect x="28" y="520" width="150" height="48" rx="10" fill="#2a2020" stroke="#c06f62" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="44" y="542" fill="#c06f62" font-size="16">⚡</text>
  <text x="66" y="542" fill="#e0c0b8" font-size="13" font-weight="600">5 V Rail</text>
  <text x="44" y="557" fill="#9eb6a4" font-size="10">MQ-2 heater element</text>

  <line x1="103" y1="520" x2="103" y2="502" stroke="#c06f62" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#aR)"/>
  <text x="112" y="515" fill="#c06f62" font-size="9" font-weight="600">5 V</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="836" y="660" width="320" height="200" rx="12" fill="#1a241a" stroke="#3d5a40" stroke-width="1"/>
  <text x="856" y="684" fill="#9eb6a4" font-size="14" font-weight="700">Legend</text>

  <line x1="856" y1="702" x2="894" y2="702" stroke="#5b9bd5" stroke-width="2.5"/>
  <text x="904" y="706" fill="#b8c8d8" font-size="12">I²C bus (SDA + SCL, shared)</text>

  <line x1="856" y1="722" x2="894" y2="722" stroke="#6aa37a" stroke-width="2"/>
  <text x="904" y="726" fill="#b8c8d8" font-size="12">GPIO / ADC (dedicated pin)</text>

  <line x1="856" y1="742" x2="894" y2="742" stroke="#7a88c4" stroke-width="2"/>
  <text x="904" y="746" fill="#b8c8d8" font-size="12">WiFi → Blynk Cloud (TLS)</text>

  <line x1="856" y1="762" x2="894" y2="762" stroke="#d4a04a" stroke-width="2"/>
  <text x="904" y="766" fill="#b8c8d8" font-size="12">HTTP POST → Local dashboard</text>

  <line x1="856" y1="782" x2="894" y2="782" stroke="#c06f62" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="904" y="786" fill="#b8c8d8" font-size="12">Power rails (3.3 V / 5 V)</text>

  <circle cx="868" cy="804" r="5" fill="#5b9bd5"/>
  <text x="904" y="808" fill="#b8c8d8" font-size="12">Bus tap (shared connection)</text>

  <rect x="856" y="820" width="18" height="14" rx="4" fill="none" stroke="#c06f62" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="904" y="832" fill="#8a7a7a" font-size="12">Not detected (wired but offline)</text>

  <rect x="856" y="842" width="18" height="14" rx="4" fill="none" stroke="#5a5a4a" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="904" y="854" fill="#7a7a6a" font-size="12">Available, not yet connected</text>

  <!-- ==================== DATA FLOW ANNOTATIONS ==================== -->
  <text x="298" y="345" text-anchor="middle" fill="#5b9bd5" font-size="10" font-style="italic">16-bit digitized</text>
  <text x="298" y="535" text-anchor="middle" fill="#5b9bd5" font-size="10" font-style="italic">Direct I²C devices ↓</text>
</svg>
